<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebGIS Bangunan Bantul</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> 
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"> 
<link rel="stylesheet" href="qgis2web/leaflet.css"> 
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css">
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="qgis2web/leaflet.js"></script> 
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script> 
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        custom: ['"Space Grotesk"', 'sans-serif']
      }
    }
  }
}
</script>

<style>
body { margin:0; font-family:Space Grotesk; }

/* ===== MAP PAGE ===== */
#mapPage{ display:none; }

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:50px;
    background:#0b1f3a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    z-index:10;
}

.nav-title{ font-weight:bold; }

.nav-menu{
    display:flex;
    gap:10px;
    margin-right:5px;
	cursor:pointer;
}

.nav-menu button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
	background:white;
    color:#1e293b;
}

#hasilBox{
    position:absolute;
    bottom:80px;
    right:10px;
    background:white;
    padding:10px;
    border-radius:8px;
    z-index:10;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

.dropdown{
    background:white;
    border-radius:5px;
    margin:5px 0;
    padding:5px;
}

.hidden{
    display:none;
}

/* MAP */
#map{
    position:absolute;
    top:50px;
    bottom:50px;
    width:100%;
}

/* LAYER */
.layer-control{
    position:absolute;
    bottom:70px;
    left:10px;
    background:white;
    padding:10px;
    border-radius:6px;
    z-index:5;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* FOOTER */
footer{
    position:absolute;
    bottom:0;
    width:100%;
    height:50px;
    background:#0b1f3a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<!-- ===== LANDING ===== -->
<div id="home" 
    class="h-screen bg-contain bg-no-repeat bg-center flex flex-col justify-center items-center text-center text-white font-custom"
    style="
    background-image:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('LOGO PRODI GEOMATIKA.jpg');
    "> 

    <h1 class="text-4xl md:text-6xl font-bold mb-4">
        PENERAPAN SISTEM INFORMASI GEOGRAFIS
    </h1>

    <p class="text-lg md:text-xl mb-6 opacity-90">
        Bangunan di Kapanewon Bantul
    </p>

    <button onclick="showMap()"
        class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg shadow-lg transition duration-300">
        Selengkapnya
    </button>

</div>

<!-- ===== MAP ===== -->
<div id="mapPage">

<div class="navbar">
    <div class="nav-title">Bangunan di Kapanewon Bantul</div>
    <div class="nav-menu">
        <button onclick="kembali()">Kembali</button>
    </div>
</div>

<div id="map"></div>

<!-- HASIL -->
<div id="hasilBox">Hasil: -</div>

<footer>
    © IzzaAnggithaAryanawa_117230030
</footer>

<script>

var map = L.map('map', {
    zoomControl:true
}).setView([-7.887432, 110.327542], 12);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);
	
fetch('Building_KecBantul_filtered.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: function(feature){
            return {
                color: "#000",
                fillColor: feature.properties.jenis === 'A' ? 'red' : 'blue',
                fillOpacity: 0.6
            };
        },
        onEachFeature: function(feature, layer){
            layer.bindPopup(
                "<b>Info Bangunan</b><br>" +
                "Nama: " + (feature.properties.nama || "-") + "<br>" +
                "Jenis: " + (feature.properties.jenis || "-")
            );
        }
    }).addTo(map);
});

fetch('Batas_KecBantul.geojson')
.then(res => res.json())
.then(data => {
    L.geoJSON(data, {
        style: {
            color: "orange",
            weight: 2,
            fillOpacity: 0
        }
    }).addTo(map);
});

L.Routing.control({
    waypoints: [
        L.latLng(-7.88, 110.32),
        L.latLng(-7.87, 110.33)
    ]
}).addTo(map);

map.on('click', function(e){
    console.log(e.latlng);
});

function kembali() {
    window.location.href = "Map2.1.html";
}

map.on('click', function(e){
    console.log(e.latlng);
});
	
// ================= MENU =================
function toggleMenu(menu){

    let el = document.getElementById("menu-" + menu);

    // cek apakah lagi terbuka
    let isOpen = el.style.display === "block";

    // tutup semua dropdown
    document.querySelectorAll('.dropdown').forEach(d => d.style.display='none');

    // kalau sebelumnya TIDAK terbuka → buka
    if (!isOpen){
        el.style.display = "block";
    }

}

var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png');

var satelit = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

L.control.layers({
    "Street": osm,
    "Satelit": satelit
}).addTo(map);

function resetTool() {
    document.getElementById("hasilBox").innerHTML = "Hasil: -";
}

function showMap(){
    document.getElementById('home').style.display = 'none';
    document.getElementById('mapPage').style.display = 'block';

    setTimeout(() => {
        map.invalidateSize();
    }, 500);
}
</script>
